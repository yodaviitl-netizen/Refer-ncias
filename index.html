<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referências</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #ffffff;
}

header {
    text-align: center;
    padding: 20px;
}

.voltar {
    display: inline-block;
    padding: 10px 20px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    margin-bottom: 20px;
}

.container {
    width: 90%;
    margin: auto;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.item {
    background: #f5f5f5;
    border-radius: 10px;
    overflow: hidden;
}

.item img {
    width: 100%;
    height: auto;
    display: block;
}

.titulo {
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* bloco com 2 fotos */
.duplo {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (min-width: 1024px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
    }
}
</style>
</head>

<body>

<header>
    <a href="https://yodaviitl-netizen.github.io/comprasonline/" class="voltar">⬅ Voltar para o site</a>
    <h1> Veja todas Referências da loja Soomoon-Lojinha</h1>
</header>

        <!-- FOTO NORMAL -->
